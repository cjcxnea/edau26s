<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面迁移通知</title>
    <style>
        /* ===== Design Tokens ===== */
        :root {
            --color-bg: #f7f8fa;
            --color-surface: #ffffff;
            --color-border: #e5e7eb;
            --color-text-primary: #111827;
            --color-text-secondary: #6b7280;
            --color-accent: #2563eb;
            --color-accent-hover: #1d4ed8;
            --color-accent-soft: #eff6ff;
            --color-chip-bg: #f3f4f6;
            --shadow-card: 0 4px 24px rgb(17 24 39 / 0.06);
            --shadow-btn: 0 2px 8px rgb(37 99 235 / 0.25);
            --radius-card: 16px;
            --radius-control: 10px;
            --transition: 200ms ease;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --color-bg: #0f1115;
                --color-surface: #1a1d24;
                --color-border: #2a2f3a;
                --color-text-primary: #f3f4f6;
                --color-text-secondary: #9ca3af;
                --color-accent: #3b82f6;
                --color-accent-hover: #60a5fa;
                --color-accent-soft: rgb(59 130 246 / 0.12);
                --color-chip-bg: #242933;
                --shadow-card: 0 4px 24px rgb(0 0 0 / 0.35);
                --shadow-btn: 0 2px 8px rgb(59 130 246 / 0.3);
            }
        }

        /* ===== Base ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background-color: var(--color-bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            color: var(--color-text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== Card ===== */
        .notice-card {
            width: 100%;
            max-width: 480px;
            padding: 48px 36px 36px;
            background-color: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-card);
            text-align: center;
        }

        .notice-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            margin-bottom: 24px;
            background-color: var(--color-accent-soft);
            border-radius: 50%;
            color: var(--color-accent);
        }

        .notice-title {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 0.02em;
            margin-bottom: 12px;
        }

        .notice-desc {
            font-size: 15px;
            color: var(--color-text-secondary);
            margin-bottom: 32px;
        }

        /* ===== Primary Button ===== */
        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            min-height: 48px;
            padding: 12px 24px;
            background-color: var(--color-accent);
            color: #ffffff;
            font-size: 16px;
            font-weight: 500;
            text-decoration: none;
            border: none;
            border-radius: var(--radius-control);
            box-shadow: var(--shadow-btn);
            cursor: pointer;
            transition: background-color var(--transition), transform var(--transition);
        }

        .btn-primary:hover {
            background-color: var(--color-accent-hover);
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:focus-visible {
            outline: 2px solid var(--color-accent);
            outline-offset: 3px;
        }

        /* ===== URL Section ===== */
        .url-section {
            margin-top: 32px;
            padding-top: 28px;
            border-top: 1px solid var(--color-border);
        }

        .url-tip {
            font-size: 14px;
            color: var(--color-text-secondary);
            margin-bottom: 12px;
        }

        .url-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 10px 10px 16px;
            background-color: var(--color-chip-bg);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-control);
        }

        .url-text {
            flex: 1;
            min-width: 0;
            font-family: "SF Mono", Consolas, "Courier New", monospace;
            font-size: 14px;
            color: var(--color-text-primary);
            text-align: left;
            overflow-wrap: anywhere;
            user-select: all;
        }

        .btn-copy {
            flex-shrink: 0;
            min-height: 36px;
            padding: 6px 14px;
            background-color: transparent;
            color: var(--color-accent);
            font-size: 13px;
            font-weight: 500;
            border: 1px solid var(--color-accent);
            border-radius: 8px;
            cursor: pointer;
            transition: background-color var(--transition), color var(--transition);
        }

        .btn-copy:hover {
            background-color: var(--color-accent);
            color: #ffffff;
        }

        .btn-copy:focus-visible {
            outline: 2px solid var(--color-accent);
            outline-offset: 2px;
        }

        .btn-copy.copied {
            background-color: var(--color-accent);
            color: #ffffff;
        }

        /* ===== Footer Note ===== */
        .footer-note {
            margin-top: 28px;
            font-size: 13px;
            color: var(--color-text-secondary);
        }

        /* ===== Motion ===== */
        @media (prefers-reduced-motion: no-preference) {
            .notice-card {
                animation: fade-in-up 400ms ease both;
            }

            @keyframes fade-in-up {
                from {
                    opacity: 0;
                    transform: translateY(12px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        }

        /* ===== Small Screens ===== */
        @media (max-width: 400px) {
            .notice-card {
                padding: 36px 24px 28px;
            }

            .notice-title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <main class="notice-card" role="main">
        <div class="notice-icon" aria-hidden="true">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
        </div>

        <h1 class="notice-title">本页面即将停止更新</h1>
        <p class="notice-desc">本页面已停止维护，后续内容将在新地址继续更新。<br>请点击下方按钮，跳转到新页面继续访问。</p>

        <a class="btn-primary" href="https://cjcxnea.github.io/educet/">
            前往新页面
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
        </a>

        <section class="url-section" aria-label="新网址">
            <p class="url-tip">为避免后续无法访问，请收藏保存新网址：</p>
            <div class="url-chip">
                <span class="url-text" id="newUrl">https://cjcxnea.github.io/educet/</span>
                <button class="btn-copy" id="copyBtn" type="button">复制</button>
            </div>
        </section>

        <p class="footer-note">感谢您一直以来的使用与支持</p>
    </main>

    <script>
        (function () {
            var copyBtn = document.getElementById('copyBtn');
            var url = document.getElementById('newUrl').textContent.trim();

            function showCopied() {
                copyBtn.textContent = '已复制';
                copyBtn.classList.add('copied');
                setTimeout(function () {
                    copyBtn.textContent = '复制';
                    copyBtn.classList.remove('copied');
                }, 2000);
            }

            copyBtn.addEventListener('click', function () {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(url).then(showCopied, fallbackCopy);
                } else {
                    fallbackCopy();
                }
            });

            function fallbackCopy() {
                var textarea = document.createElement('textarea');
                textarea.value = url;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    showCopied();
                } catch (e) {
                    copyBtn.textContent = '请手动复制';
                }
                document.body.removeChild(textarea);
            }
        })();
    </script>
</body>
</html>
